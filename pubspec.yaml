name: isla
description: "ISLA — Real-time sign language translation app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera capture at 30 FPS native, frame batching
  camera: ^0.10.6

  # Reactive state management across pipeline layers
  flutter_riverpod: ^2.5.0

  # TFLite runtime for gesture classifier MLP and LSTM (used in Phase 3)
  tflite_flutter: ^0.12.1

  # Placeholder for hand landmark extraction — FIXME: Phase 2 will migrate to
  # a direct MediaPipe Hand Landmarker solution (hand_landmarker or custom FFI
  # bridge). google_mlkit_pose_detection is used here only as a structured
  # placeholder to satisfy the model layer shape.
  # See: sdd/core-pipeline-senas/design — HandLandmarker interface.
  google_mlkit_pose_detection: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
